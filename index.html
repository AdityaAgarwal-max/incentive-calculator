<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Incentive Calculator</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 30px;
    }
    .container {
      max-width: 500px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin: auto;
    }
    h2 {
      text-align: center;
    }
    select, input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    .result {
      font-size: 18px;
      font-weight: bold;
      color: green;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Incentive Calculator</h2>

  <label>Product Type</label>
  <select id="product">
    <option value="mf">Mutual Funds</option>
    <option value="insurance">Term Insurance</option>
    <option value="pms">PMS / AIF</option>
    <option value="fd">Corporate FD / Bonds / Debentures</option>
  </select>

  <label>Frequency</label>
  <select id="frequency" onchange="updateLabel()">
    <option value="yearly">Yearly</option>
    <option value="semi">Semi-Yearly</option>
    <option value="monthly">Monthly</option>
  </select>

  <label id="amountLabel">First Year Premium</label>
  <input type="number" id="amount" placeholder="Enter amount">

  <button onclick="calculate()">Calculate Incentive</button>

  <div class="result" id="result"></div>
</div>

<script>
function updateLabel() {
  const freq = document.getElementById("frequency").value;
  const label = document.getElementById("amountLabel");

  if (freq === "yearly") {
    label.innerText = "First Year Premium";
  } else if (freq === "semi") {
    label.innerText = "First Installment";
  } else {
    label.innerText = "First 2 Months Value";
  }
}

function calculate() {
  const product = document.getElementById("product").value;
  const freq = document.getElementById("frequency").value;
  const amount = parseFloat(document.getElementById("amount").value);

  if (!amount || amount <= 0) {
    alert("Please enter a valid amount");
    return;
  }

  let incentive = 0;

  if (product === "mf") {
    incentive = amount * 0.001; // 0.1%
  }

  else if (product === "insurance") {
    if (freq === "monthly") {
      incentive = amount * 0.15; // 15% of 2 months
    } else {
      incentive = amount * 0.15; // 15% lump sum
    }
  }

  else if (product === "pms") {
    incentive = amount * 0.005; // 0.5%
  }

  else if (product === "fd") {
    incentive = amount * 0.002; // 0.2%
  }

  document.getElementById("result").innerText =
    "Incentive: ₹ " + incentive.toFixed(2);
}
</script>

</body>
</html>
