<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Company Version - Shree Capital</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
}

.container {
  max-width: 550px;
  margin: 40px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.logo {
  display: block;
  margin: 0 auto;
  max-width: 140px;
}

h2 { text-align: center; }

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #007bff;
  color: white;
  border: none;
}

.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option {
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.option.selected {
  background: #007bff;
  color: white;
}

.option input { display:none; }

.result {
  margin-top: 10px;
  padding: 10px;
  background: #e6f4ea;
  border-radius: 8px;
  text-align: center;
  display: none;
}

.total {
  margin-top: 10px;
  padding: 10px;
  background: #fff3cd;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
}

.history-item {
  padding: 6px;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container" id="loginPage">
  <img src="logo.png" class="logo">
  <h2>Intern Login</h2>
  <input type="text" id="name" placeholder="Enter your name">
  <button onclick="login()">Enter</button>
</div>

<div class="container" id="appPage" style="display:none;">
  <img src="logo.png" class="logo">
  <h2 id="welcome"></h2>

  <div class="total" id="totalEarnings"></div>

  <label><b>Product</b></label>
  <div class="options">
    <label class="option"><input type="radio" name="product" value="mf"> Mutual Funds</label>
    <label class="option"><input type="radio" name="product" value="insurance"> Insurance</label>
    <label class="option"><input type="radio" name="product" value="pms"> PMS/AIF</label>
    <label class="option"><input type="radio" name="product" value="fd"> Corporate FD</label>
  </div>

  <label><b>Frequency</b></label>
  <select id="frequency" onchange="updateLabel()">
    <option value="yearly">Yearly</option>
    <option value="semi">Semi-Yearly</option>
    <option value="monthly">Monthly</option>
  </select>

  <label id="amountLabel"><b>First Year Premium</b></label>
  <input type="number" id="amount" placeholder="Enter amount">

  <button onclick="calculate()">Calculate</button>

  <div class="result" id="result"></div>

  <h3>History</h3>
  <div id="historyList"></div>
</div>

<script>

const productNames = {
  mf: "Mutual Funds",
  insurance: "Insurance",
  pms: "PMS/AIF",
  fd: "Corporate FD"
};

// FORMAT ₹
function formatINR(num) {
  return num.toLocaleString('en-IN');
}

// LOGIN
function login() {
  const name = document.getElementById("name").value;
  if (!name) return alert("Enter name");

  localStorage.setItem("user", name);
  showApp();
}

function showApp() {
  const name = localStorage.getItem("user");
  if (!name) return;

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("appPage").style.display = "block";
  document.getElementById("welcome").innerText = "Welcome, " + name;

  loadHistory();
}

// SELECT UI
const options = document.querySelectorAll('.option');
options.forEach(option => {
  option.addEventListener('click', () => {
    options.forEach(o => o.classList.remove('selected'));
    option.classList.add('selected');
    option.querySelector('input').checked = true;
  });
});

// LABEL
function updateLabel() {
  const freq = document.getElementById("frequency").value;
  const label = document.getElementById("amountLabel");

  if (freq === "yearly") label.innerText = "First Year Premium";
  else if (freq === "semi") label.innerText = "First Installment (Semi-Yearly)";
  else label.innerText = "First 2 Months Value";
}

// CALCULATE
function calculate() {
  const product = document.querySelector('input[name="product"]:checked');
  const amount = parseFloat(document.getElementById("amount").value);

  if (!product || !amount) return alert("Fill all fields");

  let incentive = 0;
  const p = product.value;

  if (p === "mf") incentive = amount * 0.001;
  else if (p === "insurance") incentive = amount * 0.15;
  else if (p === "pms") incentive = amount * 0.005;
  else if (p === "fd") incentive = amount * 0.002;

  const formatted = formatINR(incentive.toFixed(2));

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerText = "💰 Incentive: ₹ " + formatted;

  saveHistory(p, amount, incentive);
}

// SAVE
function saveHistory(product, amount, incentive) {
  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.push({
    product,
    amount,
    incentive
  });

  localStorage.setItem("history", JSON.stringify(history));
  loadHistory();
}

// LOAD
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  const list = document.getElementById("historyList");
  const totalBox = document.getElementById("totalEarnings");

  list.innerHTML = "";
  let total = 0;

  history.slice().reverse().forEach(item => {
    total += item.incentive;

    const div = document.createElement("div");
    div.className = "history-item";
    div.innerText =
      `${productNames[item.product]} | ₹${formatINR(item.amount)} → ₹${formatINR(item.incentive)}`;
    list.appendChild(div);
  });

  totalBox.innerText = "Total Earnings: ₹ " + formatINR(total.toFixed(2));
}

// INIT
showApp();
updateLabel();

</script>

</body>
</html>
